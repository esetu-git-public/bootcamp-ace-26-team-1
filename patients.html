<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients - HealthAI</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}
</script>

<div class="wrapper">

<div class="sidebar">
    <h2><i class="fa-solid fa-hospital"></i> HealthAI</h2>

    <ul>
        <li onclick="goTo('dashboard.html')"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
        <li class="active" onclick="goTo('patients.html')"><i class="fa-solid fa-user-group"></i> Patients</li>
        <li onclick="goTo('add-patient.html')"><i class="fa-solid fa-user-plus"></i> Add Patient</li>
        <li onclick="goTo('prediction.html')"><i class="fa-solid fa-brain"></i> Prediction</li>
        <li onclick="goTo('upload.html')"><i class="fa-solid fa-upload"></i> Upload</li>
        <li onclick="goTo('reports.html')"><i class="fa-solid fa-file-lines"></i> Reports</li>
        <li onclick="goTo('audit.html')"><i class="fa-solid fa-shield-halved"></i> Audit Logs</li>
    </ul>
</div>

<div class="main-content">

    <div class="topbar">
        <div class="search-box">
            <input type="text" placeholder="Search patients...">
        </div>

        <div class="top-actions">
            <button><i class="fa-solid fa-bell"></i></button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="topbar" style="margin-top:20px;">
        <h1>Patient Management</h1>
        <button onclick="goTo('add-patient.html')">+ Add Patient</button>
    </div>

    <div class="table-box">
        <table>
            <tr>
                <th>Patient ID</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Risk Level</th>
                <th>Action</th>
            </tr>

            <tr>
                <td>P101</td>
                <td>65</td>
                <td>Male</td>
                <td><span class="high">🔴 High Risk</span></td>
                <td><button onclick="goTo('prediction.html')">View</button></td>
            </tr>

            <tr>
                <td>P102</td>
                <td>45</td>
                <td>Female</td>
                <td><span class="low">🟢 Low Risk</span></td>
                <td><button onclick="goTo('prediction.html')">View</button></td>
            </tr>

            <tr>
                <td>P103</td>
                <td>58</td>
                <td>Male</td>
                <td><span class="medium">🟡 Medium Risk</span></td>
                <td><button onclick="goTo('prediction.html')">View</button></td>
            </tr>
        </table>
    </div>

</div>

</div>

<script src="JavaScript/script.js"></script>
</body>
</html>
