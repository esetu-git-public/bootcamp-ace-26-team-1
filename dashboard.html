<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HealthAI</title>

    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}
</script>

<div class="wrapper">

<div class="sidebar">
    <h2><i class="fa-solid fa-hospital"></i> HealthAI</h2>

    <ul>
        <li class="active" onclick="goTo('dashboard.html')"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
        <li onclick="goTo('patients.html')"><i class="fa-solid fa-user-group"></i> Patients</li>
        <li onclick="goTo('add-patient.html')"><i class="fa-solid fa-user-plus"></i> Add Patient</li>
        <li onclick="goTo('prediction.html')"><i class="fa-solid fa-brain"></i> Prediction</li>
        <li onclick="goTo('upload.html')"><i class="fa-solid fa-upload"></i> Upload</li>
        <li onclick="goTo('reports.html')"><i class="fa-solid fa-file-lines"></i> Reports</li>
        <li onclick="goTo('audit.html')"><i class="fa-solid fa-shield-halved"></i> Audit Logs</li>
    </ul>
</div>

<div class="main-content">

    <div class="topbar">
        <div class="search-box">
            <input type="text" placeholder="Search...">
        </div>

        <div class="top-actions">
            <button onclick="toggleDarkMode()"><i class="fa-solid fa-moon"></i></button>
            <button><i class="fa-solid fa-bell"></i></button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <h1>Dashboard Overview</h1>

    <div class="card-container">
        <div class="card blue-card">
            <h3>Total Patients</h3>
            <p>30,000</p>
        </div>

        <div class="card red-card">
            <h3>High Risk</h3>
            <p>4,200</p>
        </div>

        <div class="card green-card">
            <h3>Low Risk</h3>
            <p>18,000</p>
        </div>

        <div class="card purple-card">
            <h3>Readmission Rate</h3>
            <p>14%</p>
        </div>
    </div>

    <div class="chart-box">
        <h2>Monthly Readmission Trends</h2>
        <canvas id="chart"></canvas>
    </div>

</div>

</div>

<script src="JavaScript/script.js"></script>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
        datasets: [{
            label: 'Readmissions',
            data: [12, 19, 10, 15, 14],
            tension: 0.4
        }]
    }
});
</script>

</body>
</html>
